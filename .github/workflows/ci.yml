name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# macOS CI omitted — macos-13 (Intel x86_64) runners have unreliable availability
# on the free tier. macOS ARM (Apple Silicon) is on the roadmap; CI will be added
# when the ARM-native code path ships. Linux and Windows cover the primary targets.

jobs:
  build-linux:
    name: Linux (GCC, CPU-only)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake libopenblas-dev libgomp1

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTERNATIVE_CUDA=OFF -DTERNATIVE_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify binary
        run: ./build/ternative --help || true

  build-windows:
    name: Windows (MSVC, CPU-only)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTERNATIVE_CUDA=OFF -DTERNATIVE_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify binary
        run: .\build\Release\ternative.exe --help
        continue-on-error: true
